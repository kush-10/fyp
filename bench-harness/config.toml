[defaults]
trials = 3
timeout_sec = 300
output_root = "artifacts/benchmarks"

[[targets]]
id = "aes-r0"
enabled = true
workdir = "aes-r0"
command = ["cargo", "run", "-p", "host", "--release", "--", "--json"]

[[targets]]
id = "aes-rustcrypto-r0"
enabled = true
workdir = "aes-rustcrypto-r0"
command = ["cargo", "run", "-p", "host", "--release", "--", "--json"]

[[targets]]
id = "aes-ctr-r0"
enabled = true
workdir = "aes-ctr-r0"
command = ["cargo", "run", "-p", "host", "--release", "--", "--json"]

[[targets]]
id = "salsa-r0"
enabled = true
workdir = "salsa-r0"
command = ["cargo", "run", "-p", "host", "--release", "--", "--json"]

[[targets]]
id = "lowmc-r0"
enabled = false
workdir = "lowmc-r0"
command = ["cargo", "run", "-p", "host", "--release", "--", "--json"]

[[targets]]
id = "operation-bnchmrk-r0"
enabled = true
workdir = "operation-bnchmrk-r0"
command = ["cargo", "run", "-p", "host", "--release", "--", "--json", "--iterations", "100"]
